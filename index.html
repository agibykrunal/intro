    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px)

        transform: none
      }

    @keyframes fadeIn {
      from {
        opacity: 0

      }

      }

        detail: `The Transformer introduced a radically simpler architecture for sequence modeling. Where RNNs process tokens one by one and CNNs operate on local windows, the Transformer attends to every position simultaneously via multi-head self-attention.\n\nKey contributions:\n— Multi-head attention allows the model to attend to information from different representation subspaces simultaneously.\n— Positional encodings replace the sequential bias of RNNs, allowing full parallelism during training.\n— The encoder-decoder structure with cross-attention became the template for seq2seq tasks.\n\nWhy it matters:\nEvery major LLM today — GPT, Claude, Gemini, LLaMA — is a Transformer or a direct derivative. The architecture scaled in ways nobody predicted in 2017. Arguably the most consequential ML paper of the past decade.\n\nMy take:\nWhat strikes me most is the elegance of replacing complex sequential computation with a simple attention formula. The authors removed a constraint (sequential processing) that everyone assumed was necessary, and the field hasn't looked back.`,

        detail: `This paper operationalized RLHF at scale for the first time on a real NLP task. The goal: train a summarization model that humans actually prefer, not one that maximizes log-likelihood on reference summaries.\n\nThe pipeline:\n— Collect human preference comparisons between model-generated summaries.\n— Train a reward model to predict which summary humans prefer.\n— Fine-tune the policy using PPO to maximize the learned reward.\n\nResults:\nThe RLHF-trained model dramatically outperformed supervised fine-tuning even when the SFT model was larger. Human evaluators preferred the RLHF outputs ~70% of the time.\n\nWhy it matters:\nThis is the direct ancestor of InstructGPT and ChatGPT. The same pipeline, scaled up, is what makes modern assistants actually useful.\n\nMy take:\nThe most important finding is negative — log-likelihood is a bad proxy for human preference. Building the infrastructure to capture what humans actually want is the core challenge of alignment.`,

    /* ─── TYPEWRITER ─── */
    function useTW(words, speed = 68, pause = 2200) {
      const [idx, setIdx] = useState(0); const [ch, setCh] = useState(0); const [del, setDel] = useState(false); const [txt, setTxt] = useState("");
      useEffect(() => {
        const w = words[idx];
        if (!del && ch <= w.length) { const t = setTimeout(() => { setTxt(w.slice(0, ch)); setCh(c => c + 1) }, speed); return () => clearTimeout(t); }
        if (!del && ch > w.length) { const t = setTimeout(() => setDel(true), pause); return () => clearTimeout(t); }
        if (del && ch >= 0) { const t = setTimeout(() => { setTxt(w.slice(0, ch)); setCh(c => c - 1) }, speed / 2.2); return () => clearTimeout(t); }
        if (del && ch < 0) { setDel(false); setCh(0); setIdx(i => (i + 1) % words.length); }
      }, [ch, del, idx]);
      return txt;
    }

          const r = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 600, messages })
          });
          const d = await r.json();
          const text = d.content?.map(c => c.text || "").join("") || "Couldn't get a response.";
          const newHist = [...hist, { role: "user", content: question }, { role: "assistant", content: text }];
          setHistory(newHist);
          setMsgs(m => [...m, { role: "ai", text }]);
        } catch {
          setMsgs(m => [...m, { role: "ai", text: "Connection error. Please try again." }]);
        }
        setLoading(false);
      }, []);

      useEffect(() => { if (initialQ) { setMsgs([{ role: "user", text: initialQ }]); call(initialQ, []); } }, [initialQ]);
      useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs, loading]);

      const send = () => {
        const text = q.trim(); if (!text) return;
        setQ(""); setMsgs(m => [...m, { role: "user", text }]);
        call(text, history);
      };

      return (
        <div style={{ border: "1.5px solid var(--line2)", background: active ? "var(--paper)" : "var(--bg2)", display: "flex", flexDirection: "column", height: active ? "100%" : "auto", minHeight: active ? 420 : 0, transition: "min-height .3s" }}>

            <span style={{ ...mono, fontSize: 10, letterSpacing: "1.5px", textTransform: "uppercase", color: "var(--txt3)" }}>Ask me anything</span>
            {loading && <span style={{ ...mono, fontSize: 9, color: "var(--txt4)", marginLeft: "auto" }}>thinking…</span>}
          </div>
          {active && (
            <div style={{ flex: 1, overflowY: "auto", padding: "20px 18px", display: "flex", flexDirection: "column", gap: 14 }}>
              {msgs.map((m, i) => (
                <div key={i} style={{ animation: "chatIn .3s ease both" }}>
                  {m.role === "user"
                    ? <div className="chat-user" style={{ ...body, fontSize: 13, lineHeight: 1.75, alignSelf: "flex-end", marginLeft: "auto" }}>{m.text}</div>
                    : <div className="chat-ai" style={{ ...body, fontSize: 13, lineHeight: 1.85, fontWeight: 300 }}>{m.text}</div>
                  }
                </div>
              ))}
              {loading && (
                <div className="chat-ai" style={{ display: "flex", gap: 5, alignItems: "center", height: 36 }}>
                  {[0, 1, 2].map(i => <span key={i} style={{ width: 5, height: 5, borderRadius: "50%", background: "var(--txt3)", display: "inline-block", animation: `blink 1.3s ${i * .22}s step-end infinite` }} />)}

              placeholder={active ? "follow-up question…" : "what are you working on? what's your research focus?"}
              style={{ flex: 1, background: "transparent", border: "none", borderBottom: "1px solid var(--line2)", outline: "none", ...mono, fontSize: 12, color: "var(--txt)", padding: "6px 2px", lineHeight: 1.5 }}

            <h1 style={{ ...serif, fontSize: "clamp(1.5rem,3.5vw,2.4rem)", fontWeight: 700, color: "var(--txt)", lineHeight: 1.15, marginBottom: 20, letterSpacing: "-0.5px" }}>{paper.title}</h1>
            <p style={{ ...mono, fontSize: 11, color: "var(--txt3)", lineHeight: 1.8, marginBottom: 32 }}>{paper.authors}</p>
            <div style={{ borderLeft: "3px solid var(--line2)", paddingLeft: 20, marginBottom: 36 }}>
              <p style={{ ...body, fontSize: 13.5, fontStyle: "italic", color: "var(--txt2)", lineHeight: 1.9, fontWeight: 300 }}>{paper.abstract}</p>
            </div>
            <div style={{ height: 1, background: "var(--line)", marginBottom: 36 }} />
            {paper.detail.split("\n\n").map((para, i) => {
              if (para.includes(":\n—")) {
                const [head, ...lines] = para.split("\n");
                return (
                  <div key={i} style={{ marginBottom: 32 }}>
                    <p style={{ ...mono, fontSize: 10, color: "var(--red)", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 14 }}>{head.replace(":", "")}</p>
                    {lines.map((l, j) => l.startsWith("—")
                      ? <div key={j} style={{ display: "grid", gridTemplateColumns: "2px 1fr", gap: 14, marginBottom: 10 }}>
                        <div style={{ background: "var(--line2)" }} />
                        <p style={{ ...body, fontSize: 13, color: "var(--txt2)", lineHeight: 1.85, fontWeight: 300 }}>{l.slice(1).trim()}</p>
                      </div>
                      : l.trim() ? <p key={j} style={{ ...body, fontSize: 13, color: "var(--txt2)", lineHeight: 1.85, marginBottom: 6, fontWeight: 300 }}>{l}</p> : null
                    )}
                  </div>
                );
              }
              const isLabel = para.match(/^(Why it matters|My take|Results|Key claim|Controversy|Key variants):/);
              if (isLabel) {
                const [first, ...rest] = para.split("\n");
                return (
                  <div key={i} style={{ marginBottom: 28, padding: "18px 20px", background: "var(--bg2)", border: "1px solid var(--line)" }}>
                    <p style={{ ...mono, fontSize: 10, color: "var(--red)", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 10 }}>{first.replace(":", "")}</p>
                    {rest.map((l, j) => l.trim() ? <p key={j} style={{ ...body, fontSize: 13, color: "var(--txt2)", lineHeight: 1.85, fontWeight: 300 }}>{l}</p> : null)}
                  </div>
                );
              }
              return <p key={i} style={{ ...body, fontSize: 14, color: "var(--txt2)", lineHeight: 2, marginBottom: 22, fontWeight: 300 }}>{para}</p>;
            })}
            {paper.links?.length > 0 && (
              <div style={{ marginTop: 40, paddingTop: 24, borderTop: "1px solid var(--line)" }}>
                <span style={{ ...mono, fontSize: 10, color: "var(--txt3)", letterSpacing: "1.2px", textTransform: "uppercase", marginBottom: 16, display: "block" }}>Read Paper</span>
                <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                  {paper.links.map(l => (
                    <button key={l} onClick={() => openPaper(l)}
                      style={{ ...mono, fontSize: 11, color: "var(--bg)", background: "var(--green)", border: "none", padding: "10px 22px", cursor: "pointer", letterSpacing: "1px", display: "flex", alignItems: "center", gap: 8, transition: "opacity .15s" }}
                      onMouseEnter={e => e.currentTarget.style.opacity = ".8"}
                      onMouseLeave={e => e.currentTarget.style.opacity = "1"}>
                      ↗ Open Research Paper
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ─── PROJECT DETAIL ─── */
    function ProjectDetail({ project, onBack }) {
      useEffect(() => window.scrollTo(0, 0), []);
      const statColor = s => s === "live" ? "var(--green)" : s === "beta" ? "#A07030" : "var(--txt4)";
      return (
        <div className="fadeIn" style={{ minHeight: "100vh", background: "var(--bg)", paddingTop: "var(--nav)" }}>
          <BackBar onBack={onBack} label={project.title} />
          <div style={{ maxWidth: 740, margin: "0 auto", padding: "60px 36px 100px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
              <Dot color={statColor(project.status)} />
              <span style={{ ...mono, fontSize: 10, color: "var(--txt3)", letterSpacing: "1px", textTransform: "uppercase" }}>{project.status} · {project.year}</span>
            </div>
            <h1 style={{ ...serif, fontSize: "clamp(2rem,4vw,3rem)", fontWeight: 700, color: "var(--txt)", letterSpacing: "-1px", lineHeight: .95, marginBottom: 20 }}>{project.title}</h1>
            <div style={{ borderLeft: "3px solid var(--line2)", paddingLeft: 20, marginBottom: 36 }}>
              <p style={{ ...body, fontSize: 13.5, fontStyle: "italic", color: "var(--txt2)", lineHeight: 1.9, fontWeight: 300 }}>{project.desc}</p>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 36 }}>
              {project.tech.map(t => <Stamp key={t}>{t}</Stamp>)}
            </div>
            {project.metrics && (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(140px,1fr))", gap: 0, border: "1px solid var(--line)", marginBottom: 40 }}>
                {project.metrics.map((m, i) => (
                  <div key={i} style={{ padding: "16px 18px", borderRight: i < project.metrics.length - 1 ? "1px solid var(--line)" : "none" }}>
                    <p style={{ ...serif, fontSize: 18, fontWeight: 700, color: "var(--txt)", marginBottom: 4 }}>{m.split(" ")[0]}</p>
                    <p style={{ ...mono, fontSize: 9, color: "var(--txt3)", letterSpacing: "0.8px" }}>{m.split(" ").slice(1).join(" ")}</p>
                  </div>
                ))}
              </div>
            )}
            <div style={{ height: 1, background: "var(--line)", marginBottom: 36 }} />
            {project.detail.split("\n\n").map((para, i) =>
              <p key={i} style={{ ...body, fontSize: 14, color: "var(--txt2)", lineHeight: 2, marginBottom: 22, fontWeight: 300 }}>{para}</p>
            )}
            {project.links?.length > 0 && (
              <div style={{ marginTop: 36, paddingTop: 20, borderTop: "1px solid var(--line)" }}>
                <span style={{ ...mono, fontSize: 10, color: "var(--txt3)", letterSpacing: "1.2px", textTransform: "uppercase", marginBottom: 12, display: "block" }}>Links</span>
                {project.links.map(l => <a key={l} href={"https://" + l} target="_blank" rel="noopener noreferrer" style={{ ...mono, fontSize: 11, color: "var(--green)", display: "flex", alignItems: "center", gap: 6, marginBottom: 6, textDecoration: "none" }}>↗ {l}</a>)}
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ─── RESUME PAGE (Article style) ─── */
    function ResumePage({ onBack }) {
      useEffect(() => window.scrollTo(0, 0), []);

      const handlePrint = () => { window.print() };

      const handleDownload = () => {
        // Build a clean HTML string for download
        const content = `
Krunal Sundersia

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      return (
        <div className="fadeIn" style={{ minHeight: "100vh", background: "var(--bg2)", paddingTop: "var(--nav)" }}>
          <BackBar onBack={onBack} label="Résumé" />

          {/* Download/Print actions */}
          <div className="no-print" style={{ maxWidth: 860, margin: "0 auto", padding: "28px 36px 0", display: "flex", gap: 12, justifyContent: "flex-end" }}>
            <button onClick={handlePrint}
              style={{ ...mono, fontSize: 10, letterSpacing: "1.5px", textTransform: "uppercase", background: "transparent", color: "var(--txt)", border: "1.5px solid var(--line2)", padding: "10px 20px", cursor: "pointer", transition: "all .15s" }}
              onMouseEnter={e => { e.currentTarget.style.background = "var(--line)"; }}
              onMouseLeave={e => { e.currentTarget.style.background = "transparent"; }}>

            <button onClick={handleDownload}
              style={{ ...mono, fontSize: 10, letterSpacing: "1.5px", textTransform: "uppercase", background: "var(--txt)", color: "var(--bg)", border: "none", padding: "10px 20px", cursor: "pointer", transition: "opacity .15s" }}
              onMouseEnter={e => e.currentTarget.style.opacity = ".78"}
              onMouseLeave={e => e.currentTarget.style.opacity = "1"}>
              ↓ Download .txt

          {/* Article */}

            {/* Masthead */}
            <header style={{ marginBottom: 52 }}>
              <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 24, flexWrap: "wrap", marginBottom: 24 }}>
                <div>
                  <h1 style={{ ...serif, fontSize: "clamp(2.4rem,5vw,3.6rem)", fontWeight: 700, color: "var(--txt)", letterSpacing: "-2px", lineHeight: .9, marginBottom: 12 }}>
                    Krunal<br /><em style={{ fontWeight: 400, fontStyle: "italic" }}>Sundersia</em>
                  </h1>
                  <p style={{ ...body, fontSize: 15, color: "var(--txt3)", fontStyle: "italic", marginTop: 8 }}>AI Researcher & Systems Engineer</p>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6, alignItems: "flex-end" }}>
                  {["hey@krunal.dev", "krunal.dev", "github.com/aryan", "New Delhi, India"].map(c => (
                    <span key={c} style={{ ...mono, fontSize: 10, color: "var(--txt3)", letterSpacing: "0.5px" }}>{c}</span>
                  ))}
                </div>
              </div>
              <div style={{ height: 2, background: "var(--txt)", marginBottom: 0 }} />
            </header>

            {/* About */}
            <ResArticleSection title="About">
              <p style={{ ...body, fontSize: 14.5, color: "var(--txt2)", lineHeight: 2, fontWeight: 300 }}>
                I research and build at the intersection of AI reasoning, alignment, and engineering. I care deeply about understanding how language models work from first principles — and about building tools that make AI genuinely useful for human cognition. I've led product and engineering at AGIOAS, interned at Parul University as a software and database engineer, and shipped multiple projects spanning AI agents, trading systems, and developer tooling.
              </p>
            </ResArticleSection>

            {/* Experience */}
            <ResArticleSection title="Experience">
              {WORK.map((w, i) => (
                <div key={i} style={{ marginBottom: i < WORK.length - 1 ? 40 : 0, paddingBottom: i < WORK.length - 1 ? 40 : 0, borderBottom: i < WORK.length - 1 ? "1px solid var(--line)" : "none" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", flexWrap: "wrap", gap: 8, marginBottom: 4 }}>
                    <h3 style={{ ...serif, fontSize: 18, fontWeight: 700, color: "var(--txt)", letterSpacing: "-0.4px" }}>{w.company}</h3>
                    <span style={{ ...mono, fontSize: 10, color: "var(--txt4)", letterSpacing: "0.5px", flexShrink: 0 }}>{w.period}</span>
                  </div>
                  <p style={{ ...mono, fontSize: 10, color: "var(--red)", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 16 }}>{w.role}</p>
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {w.points.map((pt, j) => (
                      <div key={j} style={{ display: "grid", gridTemplateColumns: "20px 1fr", gap: 10, alignItems: "start" }}>
                        <span style={{ ...mono, fontSize: 10, color: "var(--txt4)", paddingTop: 2, userSelect: "none" }}>→</span>
                        <p style={{ ...body, fontSize: 13.5, color: "var(--txt2)", lineHeight: 1.85, fontWeight: 300 }}>{pt}</p>
                      </div>
                    ))}
                  </div>

            <ResArticleSection title="Selected Projects">

                {PROJECTS.map((p, i) => (
                  <div key={p.id} style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 16, paddingBottom: i < PROJECTS.length - 1 ? 24 : 0, borderBottom: i < PROJECTS.length - 1 ? "1px dashed var(--line)" : "none" }}>
                    <div>
                      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6, flexWrap: "wrap" }}>
                        <span style={{ ...serif, fontSize: 15, fontWeight: 700, color: "var(--txt)" }}>{p.title}</span>
                        <Stamp variant={p.status === "live" ? "green" : p.status === "beta" ? "" : ""}>
                          {p.status}
                        </Stamp>
                        <span style={{ ...mono, fontSize: 9, color: "var(--txt4)" }}>{p.year}</span>
                      </div>
                      <p style={{ ...body, fontSize: 13, color: "var(--txt2)", lineHeight: 1.8, fontWeight: 300, marginBottom: 8 }}>{p.desc}</p>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                        {p.tech.map(t => <Stamp key={t}>{t}</Stamp>)}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </ResArticleSection>

            {/* Skills */}
            <ResArticleSection title="Skills" last>
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                {SKILLS.map(s => (
                  <div key={s.cat} style={{ display: "grid", gridTemplateColumns: "160px 1fr", gap: 16, alignItems: "start" }}>
                    <span style={{ ...mono, fontSize: 10, color: "var(--txt3)", letterSpacing: "1.2px", textTransform: "uppercase", paddingTop: 1 }}>{s.cat}</span>
                    <p style={{ ...body, fontSize: 13.5, color: "var(--txt2)", lineHeight: 1.7 }}>{s.items.join("  ·  ")}</p>
                  </div>
                ))}
              </div>
            </ResArticleSection>

            {/* Footer line */}
            <div style={{ marginTop: 48, paddingTop: 20, borderTop: "1px solid var(--line)", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
              <span style={{ ...mono, fontSize: 9, color: "var(--txt4)", letterSpacing: "1px" }}>Krunal Sundersia · {new Date().getFullYear()}</span>
              <span style={{ ...mono, fontSize: 9, color: "var(--txt4)", letterSpacing: "1px" }}>Updated regularly</span>
            </div>
          </article>
        </div>
      );
    }

    function ResArticleSection({ title, children, last = false }) {
      return (
        <div style={{ marginBottom: last ? 0 : 48, paddingBottom: last ? 0 : 48, borderBottom: last ? "none" : "1px solid var(--line)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 28 }}>
            <h2 style={{ ...mono, fontSize: 10, letterSpacing: "2.5px", textTransform: "uppercase", color: "var(--red)", whiteSpace: "nowrap" }}>{title}</h2>
            <div style={{ flex: 1, height: 1, background: "var(--line)" }} />
          </div>
          {children}
        </div>
      );
    }

    /* ─── APP ─── */
    function App() {
      const [dark, setDark] = useTheme();
      const [page, setPage] = useState({ type: "home" });
      const goHome = () => setPage({ type: "home" });

      if (page.type === "paper") return <><Navbar onNav={goHome} page="paper" dark={dark} setDark={setDark} /><PaperDetail paper={page.data} onBack={goHome} /></>;
      if (page.type === "project") return <><Navbar onNav={goHome} page="project" dark={dark} setDark={setDark} /><ProjectDetail project={page.data} onBack={goHome} /></>;
      if (page.type === "resume") return <><Navbar onNav={goHome} page="resume" dark={dark} setDark={setDark} /><ResumePage onBack={goHome} /></>;

      return (
        <>
          <Navbar onNav={p => setPage({ type: p })} page="home" dark={dark} setDark={setDark} />
          <Hero />
          <ResearchBoard onPaper={p => setPage({ type: "paper", data: p })} />
          <Projects onProject={p => setPage({ type: "project", data: p })} />
          <Skills />
          <Upcoming />
          <WorkSection />
          <ResumeSection onResume={() => setPage({ type: "resume" })} />
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
